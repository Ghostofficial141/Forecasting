[tool:pytest]
testpaths = tests
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
addopts = --tb=short -v --cov=src --cov-report=term-missing --cov-report=html:htmlcov

[flake8]
max-line-length = 100
exclude = .git,__pycache__,venv,.venv,build,dist
ignore = E501,W503,E203

[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_return_any = True
warn_unused_configs = True
